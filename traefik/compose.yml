name: edge-proxy

services:
  traefik:
    image: traefik:v3.5
    command:
      # Providers
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"

      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Global HTTP→HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      # ACME / Let's Encrypt (HTTP challenge)
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=admin@celestinrumo.ch"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"

      # API + Dashboard
      - "--api=true"
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # Logging / metrics
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme.json:/letsencrypt/acme.json
      - ./dynamic:/etc/traefik/dynamic:ro

    labels:
      - "traefik.enable=true"

      # Dashboard router (HTTPS + basic auth)
      - "traefik.http.routers.traefik.rule=Host(`traefik.celestinrumo.ch`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.tls.certresolver=le"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=basic-auth@file"

    networks:
      - traefik-proxy
    restart: unless-stopped

  elite-snow-experience:
    image: ghcr.io/celestin-rumo/snowfall-portfolio:latest
    container_name: elite-snow-experience
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"

      # All domains (.com + .ch)
      - "traefik.http.routers.elite.rule=Host(`www.elite-snow-experience.ch`) || Host(`www.elite-snow-experience.com`)"
      - "traefik.http.routers.elite.entrypoints=websecure"
      - "traefik.http.routers.elite.tls.certresolver=le"
      - "traefik.http.routers.elite.service=elite"

      # Router for non-www domains — redirect to www
      - "traefik.http.routers.elite-non-www.rule=Host(`elite-snow-experience.ch`) || Host(`elite-snow-experience.com`)"
      - "traefik.http.routers.elite-non-www.entrypoints=websecure"
      - "traefik.http.routers.elite-non-www.tls.certresolver=le"
      - "traefik.http.routers.elite-non-www.middlewares=elite-redirect-to-www"

      # Internal port of the app
      - "traefik.http.services.elite.loadbalancer.server.port=3000"

      # Middleware: redirect non-www → www (for both com + ch)
      - 'traefik.http.middlewares.elite-redirect-to-www.redirectRegex.regex=^https?://elite-snow-experience\.(com|ch)/(.*)'
      - "traefik.http.middlewares.elite-redirect-to-www.redirectRegex.replacement=https://www.elite-snow-experience.$1/$2"
      - "traefik.http.middlewares.elite-redirect-to-www.redirectRegex.permanent=true"

    networks:
      - traefik-proxy
    restart: unless-stopped

  dreamandchase-frontend:
    image: ghcr.io/celestin-rumo/dreamandchase-frontend:${IMAGE_TAG:-latest}
    container_name: dreamandchase-frontend
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"

      # Canonical domain (served app)
      - "traefik.http.routers.dreamandchase.rule=Host(`www.deam-and-chase.celestinrumo.ch`)"
      - "traefik.http.routers.dreamandchase.entrypoints=websecure"
      - "traefik.http.routers.dreamandchase.tls.certresolver=le"
      - "traefik.http.routers.dreamandchase.service=dreamandchase"

      # Redirect apex -> www
      - "traefik.http.routers.dreamandchase-non-www.rule=Host(`deam-and-chase.celestinrumo.ch`)"
      - "traefik.http.routers.dreamandchase-non-www.entrypoints=websecure"
      - "traefik.http.routers.dreamandchase-non-www.tls.certresolver=le"
      - "traefik.http.routers.dreamandchase-non-www.middlewares=dreamandchase-redirect-to-www"

      # Internal app port
      - "traefik.http.services.dreamandchase.loadbalancer.server.port=3000"

      # Middleware redirect
      - "traefik.http.middlewares.dreamandchase-redirect-to-www.redirectregex.regex=^https?://deam-and-chase\\.celestinrumo\\.ch/(.*)"
      - "traefik.http.middlewares.dreamandchase-redirect-to-www.redirectregex.replacement=https://www.deam-and-chase.celestinrumo.ch/$1"
      - "traefik.http.middlewares.dreamandchase-redirect-to-www.redirectregex.permanent=true"

    networks:
      - traefik-proxy
    restart: unless-stopped

  dev-portfolio-frontend:
    image: ghcr.io/celestin-rumo/dev-portfolio-frontend:latest
    container_name: dev-portfolio-frontend
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"

      # Canonical domain (served app)
      - "traefik.http.routers.dev-portfolio.rule=Host(`www.dev-portfolio.celestinrumo.ch`)"
      - "traefik.http.routers.dev-portfolio.entrypoints=websecure"
      - "traefik.http.routers.dev-portfolio.tls.certresolver=le"
      - "traefik.http.routers.dev-portfolio.service=dev-portfolio"

      # Redirect apex → www
      - "traefik.http.routers.dev-portfolio-non-www.rule=Host(`dev-portfolio.celestinrumo.ch`)"
      - "traefik.http.routers.dev-portfolio-non-www.entrypoints=websecure"
      - "traefik.http.routers.dev-portfolio-non-www.tls.certresolver=le"
      - "traefik.http.routers.dev-portfolio-non-www.middlewares=dev-portfolio-redirect-to-www"

      # Internal app port
      - "traefik.http.services.dev-portfolio.loadbalancer.server.port=3000"

      # Middleware redirect
      - "traefik.http.middlewares.dev-portfolio-redirect-to-www.redirectregex.regex=^https?://dev-portfolio\\.celestinrumo\\.ch/(.*)"
      - "traefik.http.middlewares.dev-portfolio-redirect-to-www.redirectregex.replacement=https://www.dev-portfolio.celestinrumo.ch/$1"
      - "traefik.http.middlewares.dev-portfolio-redirect-to-www.redirectregex.permanent=true"

    networks:
      - traefik-proxy
    restart: unless-stopped

  dev-portfolio-api:
    image: ghcr.io/celestin-rumo/dev-portfolio-api:latest
    container_name: dev-portfolio-api
    environment:
      PORT: 3001
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_TO: ${MAIL_TO}
    expose:
      - "3001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dev-portfolio-api.rule=Host(`dev-portfolio.celestinrumo.ch`) && PathPrefix(`/api`)"
      - "traefik.http.routers.dev-portfolio-api.entrypoints=websecure"
      - "traefik.http.routers.dev-portfolio-api.tls.certresolver=le"
      - "traefik.http.services.dev-portfolio-api.loadbalancer.server.port=3001"
    networks:
      - traefik-proxy
    restart: unless-stopped

networks:
  traefik-proxy:
    name: traefik-proxy
